<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview - ARTES BUHO HTML</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #faf6f0; color: #222; min-height: 100vh; }
    .toolbar {
      background: #1a1a1a;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #D62828;
    }
    .toolbar h1 { font-size: 18px; color: #fff; letter-spacing: 2px; }
    .toolbar h1 span { color: #F4B400; font-weight: 400; }
    .toolbar select {
      padding: 8px 12px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #D62828;
      color: #fff;
      font-size: 14px;
    }
    .preview-frame {
      max-width: 640px;
      margin: 30px auto;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    iframe {
      width: 100%;
      height: 700px;
      border: none;
    }
    .footer-info {
      text-align: center;
      padding: 20px;
      color: #888;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <h1>ARTES BUHO <span>— Email Preview</span></h1>
    <select id="templateSelect" onchange="loadTemplate()">
      <option value="../templates/base.html">base.html</option>
    </select>
  </div>

  <div class="preview-frame">
    <iframe id="previewFrame" src="../templates/base.html"></iframe>
  </div>

  <div class="footer-info">
    Abrir este archivo en el navegador para previsualizar plantillas. · Desarrollado por RUBEN COTON
  </div>

  <script>
    function loadTemplate() {
      var select = document.getElementById('templateSelect');
      document.getElementById('previewFrame').src = select.value;
    }
  </script>

</body>
</html>
